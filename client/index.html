<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESHA Enterprises - Municipal Non-Recyclable Plastic Waste Transporters</title>
    <meta name="description" content="ESHA Enterprises is a trusted waste management company specializing in collection, transportation, and processing of municipal and non-recyclable plastic waste in Tamil Nadu, India." />
    <link rel="shortcut icon" type="image/x-icon" href="/img/logo/favi.svg" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

    <!-- Vendor CSS (loaded from public for Font Awesome & Bootstrap which need their asset paths) -->
    <link rel="stylesheet" href="/vendor/animate/animate.min.css" />
    <link rel="stylesheet" href="/vendor/fontawesome-pro/fontawesome.min.css" />
    <link rel="stylesheet" href="/vendor/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="/vendor/fancybox/fancybox.css" />

    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/spacing.css" />
    <link rel="stylesheet" href="/css/main.css" />

    <!-- AOS Animation Styles (lightweight replacement) -->
    <style>
      [data-aos] {
        opacity: 0;
        transition-property: opacity, transform;
        transition-duration: 1s;
        transition-timing-function: ease;
      }
      [data-aos].aos-animate {
        opacity: 1;
        transform: none !important;
      }
      [data-aos="fade-up"] { transform: translate3d(0, 40px, 0); }
      [data-aos="fade-down"] { transform: translate3d(0, -40px, 0); }
      [data-aos="fade-right"] { transform: translate3d(-40px, 0, 0); }
      [data-aos="fade-left"] { transform: translate3d(40px, 0, 0); }
      [data-aos="zoom-in"] { transform: scale(0.9); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- PureCounter (loaded globally since it uses class-based initialization) -->
    <script src="/vendor/counter/purecounter.js"></script>
  </body>
</html>
